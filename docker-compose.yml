services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tickets_db
    volumes:
      - db_data:/var/lib/postgresql/data
      # Inicialización automática: crear extensión y tabla 'tickets'
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build: .
    command: npm run dev
    working_dir: /app
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tickets_db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      # Bind-mount source code for development. Avoid `:cached` (Docker Desktop specific).
      - ./:/app
      # Use a named volume for node_modules to avoid permission issues across hosts
      - node_modules:/app/node_modules
    restart: on-failure

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_DB_DRIVER: pgsql
    depends_on:
      - db

volumes:
  db_data:
    driver: local
  node_modules:
    driver: local
