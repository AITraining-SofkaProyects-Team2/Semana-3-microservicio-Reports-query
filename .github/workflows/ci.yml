name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run unit tests and save coverage summary
        run: mkdir -p coverage && npm run test | tee coverage/coverage-summary.txt

      - name: Check coverage
        run: |
          COVERAGE=$(grep -Po 'All files.*\K\d+(?=%)' coverage/coverage-summary.txt)
          if [ "$COVERAGE" -lt 70 ]; then
            echo "Coverage is below 70% ($COVERAGE%)"
            exit 1
          fi