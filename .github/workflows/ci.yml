name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests and collect coverage
        # Reemplaza 'npm run coverage' con tu comando específico si es diferente
        run: npm run coverage 
      
      # Opcional: Publicar el reporte a un servicio externo (como Codecov o Coveralls)
      # Requerirá configurar secretos en tu repositorio de GitHub
      - name: Upload coverage to Codecov
        uses: [codecov/codecov-action@v4](https://github.com)
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Otras opciones según tu configuración
          
      # Opcional: Usar una acción del Marketplace para comentar el PR con el resumen de cobertura
      - name: Report coverage in PR comment
        if: github.event_name == 'pull_request'
        uses: [actions/coverage-report@v2](https://github.com/marketplace/actions/node-coverage-report)
        with:
          # La acción intentará leer el output de istanbuljs/nyc
          # Asegúrate de que tu script genera un formato compatible (json-summary o text-summary)
          # Puedes consultar la documentación de la acción específica que elijas en GitHub Marketplace