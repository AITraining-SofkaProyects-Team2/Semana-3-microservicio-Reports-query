name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run unit tests and save coverage summary
        run: npm test -- --coverageReporters=lcov # Command to run tests and generate lcov file

      - name: Check minimum coverage percentage
        uses: devmasx/coverage-check-action@v1.2.0 # Action to check the coverage
        with:
          type: lcov
          result_path: coverage/lcov.info # Path to your coverage report file
          min_coverage: 70 # The minimum coverage required (e.g., 80%)
          token: ${{ secrets.GITHUB_TOKEN }} # Use the built-in GITHUB_TOKEN