name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  run-tests:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.set-coverage.outputs.coverage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run unit tests and save coverage summary
        run: mkdir -p coverage && npm run test 2>&1 | tee coverage/coverage-summary.txt

      - name: Debug: list coverage directory
        if: always()
        run: |
          echo 'Contents of coverage/:'
          ls -la coverage || true
          echo 'Find JSON files under coverage/:'
          find coverage -type f -name '*.json' -print || true

      - name: Upload coverage as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifact
          path: coverage

      - id: set-coverage
        name: Determine coverage and set output
        run: |
          set -euo pipefail
          COVERAGE=0
          # Prefer JSON summary produced by vitest/coverage reporter
          if [ -f coverage/coverage-summary.json ]; then
            echo "Found coverage/coverage-summary.json, extracting percentage..."
            COVERAGE=$(node -e "const fs=require('fs');const p='coverage/coverage-summary.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));const pct=(j.total && (j.total.lines||j.total.statements||j.total))?((j.total.lines&&j.total.lines.pct)?j.total.lines.pct:((j.total.statements&&j.total.statements.pct)?j.total.statements.pct:(j.total.pct||0))):0;console.log(Math.round(pct));")
          elif [ -f coverage/coverage-summary.txt ]; then
            echo "Falling back to coverage/coverage-summary.txt"
            COVERAGE=$(grep -Po 'All files.*\\K\d+(?=%)' coverage/coverage-summary.txt || true)
          else
            echo "Coverage summary files not found (coverage/coverage-summary.json or coverage/coverage-summary.txt). Trying to grep the text file anyway..."
            COVERAGE=$(grep -Po 'All files.*\\K\d+(?=%)' coverage/coverage-summary.txt || true)
          fi

          echo "Coverage detected: ${COVERAGE}%"
          if [ -z "${COVERAGE}" ]; then
            echo "Could not determine coverage percentage." >&2
            exit 1
          fi
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT

  check-coverage:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout (for workspace)
        uses: actions/checkout@v3

      - name: Print coverage from previous job
        run: |
          echo "Coverage from tests job: ${{ needs.run-tests.outputs.coverage }}%"

      - name: Fail if coverage below threshold
        run: |
          set -euo pipefail
          COVERAGE=${{ needs.run-tests.outputs.coverage }}
          if [ -z "${COVERAGE}" ]; then
            echo "No coverage value received from tests job" >&2
            exit 1
          fi
          if [ "${COVERAGE}" -lt 70 ]; then
            echo "Coverage is below 70% (${COVERAGE}%)"
            exit 1
          fi